name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Check Marketplace publish availability
        id: marketplace
        run: |
          if [ -n "${{ secrets.VSCE_PAT }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VSCE_PAT is not set — skipping Marketplace publish. GitHub Release will still be created with the VSIX."
          fi

      - name: Publish to VS Code Marketplace
        if: steps.marketplace.outputs.publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MD-PDF Exporter v${{ env.RELEASE_VERSION }}
          files: package/*.vsix
          generate_release_notes: true

  sync-develop:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout develop
          git pull origin develop
          git merge origin/main -m "chore: sync develop with main after release"
          git push origin develop
